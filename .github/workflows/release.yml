name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Type check
        run: uv run mypy src/pygenkit/
      - name: Test
        run: uv run pytest
      - name: Build
        run: uv build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.repository_owner == 'alan-n7x'
        with:
          generate_release_notes: true
          files: dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: github.repository_owner == 'alan-n7x'
        with:
          skip-existing: true
